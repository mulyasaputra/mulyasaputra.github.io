<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Explore Appsventory & NineCode digital product library - access premium source codes, classes, and software tools." />
    <title>Library - Appsventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class'
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      #filters .active {
        background-color: #6366f1;
        color: white !important;
      }
    </style>
  </head>

  <body class="bg-gray-50 dark:bg-[#1e1e2f] text-gray-800 dark:text-gray-100 font-sans transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 py-6">
      
      <!-- Back to Portfolio & Theme Toggle Header -->
      <header class="flex justify-between items-center mb-8 pb-4 border-b border-gray-200 dark:border-gray-800">
        <a href="./index.html" class="text-md font-bold text-indigo-600 dark:text-indigo-400 flex items-center gap-2 hover:underline">
          <i class="fas fa-arrow-left text-sm"></i> Back to Portfolio
        </a>
        <button id="theme-toggle-btn" class="text-gray-600 dark:text-gray-300 hover:text-indigo-600 dark:hover:text-indigo-400 p-2 rounded-full focus:outline-none" aria-label="Toggle Dark Mode">
          <i id="theme-icon" class="fas fa-moon text-lg"></i>
        </button>
      </header>

      <h1 class="text-3xl font-bold text-center mb-6 text-gray-800 dark:text-white">
        Appsventory × NineCode
      </h1>

      <!-- View toggle -->
      <div class="flex justify-center mb-6">
        <label class="flex items-center gap-3 cursor-pointer">
          <span class="text-sm">List</span>
          <input id="viewToggle" type="checkbox" class="toggle-input hidden" />
          <div class="w-12 h-6 bg-gray-700 rounded-full relative transition">
            <div
              id="toggleKnob"
              class="absolute top-1 right-1 w-4 h-4 bg-white rounded-full transition"
            ></div>
          </div>
          <span class="text-sm">Grid</span>
        </label>
      </div>

      <!-- Filters -->
      <div id="filters" class="flex flex-wrap justify-center gap-3 mb-8"></div>

      <!-- Wrapper -->
      <div
        id="productWrapper"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 transition-all"
      ></div>

      <div id="pagination" class="pagination mt-5"></div>

      <footer>
        <p class="text-xs mt-5 text-gray-400">
          &copy; <span class="year"></span> ICK Network. All rights reserved.
        </p>
      </footer>
    </div>

    <!-- Dialog Info -->
    <div
      id="modal"
      class="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-5 hidden transition-opacity duration-300"
    >
      <div
        class="bg-white dark:bg-[#2f2f4c] text-gray-800 dark:text-gray-100 relative max-w-xl w-full transform transition-all rounded-xl shadow-2xl overflow-hidden"
      >
        <!-- Modal Close Button -->
        <button
          id="closeModal"
          class="absolute p-2 bg-white/80 dark:bg-black/40 backdrop-blur-sm rounded-full top-3 right-3 text-gray-800 dark:text-white hover:bg-gray-200 dark:hover:bg-black/60 transition z-10"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            ></path>
          </svg>
        </button>

        <!-- Modal Body -->
        <div>
          <img
            id="modalImage"
            src="asset/thumbnails/toper.png"
            alt="Thumbnail"
            class="w-full h-80 object-cover"
          />
          <div class="p-7">
            <h3
              id="modalTitle"
              class="text-2xl font-bold mb-2 text-gray-800 dark:text-white"
            ></h3>
            <p class="text-indigo-600 dark:text-indigo-400 text-xl font-semibold mb-3">
              <span id="price">0</span>
              <span class="text-xs font-normal">IDR</span>
            </p>
            <p id="modalDescription" class="text-gray-600 dark:text-gray-300 mb-6 text-sm leading-relaxed"></p>
            <button id="ctaButton" class="w-full text-center py-2.5 rounded-xl font-semibold transition"></button>
          </div>
        </div>
      </div>
    </div>
    <script>
      document.querySelector(".year").textContent = new Date().getFullYear();
      // TOGGLE GRID/LIST
      const toggle = document.getElementById("viewToggle");
      const knob = document.getElementById("toggleKnob");
      const wrapper = document.getElementById("productWrapper");

      toggle.addEventListener("change", () => {
        if (toggle.checked) {
          wrapper.className = "flex flex-col gap-5";
          knob.style.left = "0.25rem";
        } else {
          wrapper.className =
            "grid grid-cols-1 md:grid-cols-2 gap-5 lg:grid-cols-3";
          knob.style.left = "calc(100% - 1.25rem)";
        }
      });
    </script>
    <script>
      const productsPerPage = 9;
      let currentPage = 1;
      let products = [];
      let filteredProducts = [];
      let activeFilter = "all";

      function toSlug(str) {
        return str
          .toLowerCase()
          .trim()
          .replace(/\s+/g, "-")
          .replace(/[^a-z0-9\-]/g, "");
      }

      function truncateSmart(text, maxLength) {
        if (text.length <= maxLength) return text;
        const truncated = text.slice(0, maxLength);
        return truncated.slice(0, truncated.lastIndexOf(" ")) + "...";
      }

      // RENDER CATEGORY BUTTONS
      function renderCategory() {
        const filters = document.getElementById("filters");
        filters.innerHTML = "";

        const categories = ["All", ...new Set(products.map((p) => p.category))];

        categories.forEach((cat, index) => {
          const btn = document.createElement("button");
          btn.dataset.filter = toSlug(cat);
          btn.className = `filter-btn px-4 py-1.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-sm font-medium transition ${index === 0 ? "active" : ""}`;
          btn.textContent = cat;
          filters.appendChild(btn);
        });

        bindFilterEvents();
      }

      // FILTER DATA
      function applyFilter(filter) {
        activeFilter = filter;
        currentPage = 1;

        if (filter === "all") {
          filteredProducts = products;
        } else {
          filteredProducts = products.filter(
            (p) => toSlug(p.category) === filter,
          );
        }

        renderProducts();
        renderPagination();
      }

      // MODAL EVENTS
      function bindModalEvents() {
        const modal = document.getElementById("modal");
        const modalTitle = document.getElementById("modalTitle");
        const modalPrice = document.getElementById("price");
        const modalDescription = document.getElementById("modalDescription");
        const modalImage = document.getElementById("modalImage");
        const ctaButton = document.getElementById("ctaButton");
        const closeModalBtn = document.getElementById("closeModal");
        const itemContainer = document.getElementById("productWrapper");

        itemContainer.addEventListener("click", function (e) {
          if (
            e.target.classList.contains("download-link") ||
            e.target.closest(".download-link")
          ) {
            return;
          }
          const clickedItem = e.target.closest(".klik");

          if (clickedItem) {
            const id = clickedItem.getAttribute("data-id");
            const data = filteredProducts.find(
              (product) => toSlug(product.title) === id,
            );
            if (data) {
              modalTitle.textContent = data.title;
              modalDescription.textContent = data.description;
              modalImage.src = data.image || "asset/thumbnails/toper.png";

              // Dynamic Price Rendering
              const priceContainer = modalPrice.parentElement;
              if (data.availability === 2) {
                priceContainer.style.display = "none";
              } else if (data.price === 0) {
                priceContainer.style.display = "block";
                modalPrice.textContent = "Free";
                const currencySpan = priceContainer.querySelector(".text-xs");
                if (currencySpan) currencySpan.style.display = "none";
              } else {
                priceContainer.style.display = "block";
                modalPrice.textContent = data.price.toLocaleString("id-ID") + " ";
                const currencySpan = priceContainer.querySelector(".text-xs");
                if (currencySpan) currencySpan.style.display = "inline";
              }

              // CTA Button Configuration
              ctaButton.textContent =
                data.availability === 0
                  ? "Sold Out"
                  : data.availability === 2
                    ? "Coming Soon"
                    : data.cta.label;

              if (data.availability === 1) {
                ctaButton.className = "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-7 rounded-xl transition shadow-md shadow-indigo-600/10";
                ctaButton.disabled = false;
                ctaButton.onclick = () => {
                  window.open(data.cta.url, "_blank");
                };
              } else {
                ctaButton.className = "w-full bg-gray-300 dark:bg-gray-700 text-gray-500 dark:text-gray-400 font-semibold py-2.5 px-7 rounded-xl cursor-not-allowed";
                ctaButton.disabled = true;
                ctaButton.onclick = null;
              }

              modal.classList.remove("hidden");
            }
          }
        });

        closeModalBtn.addEventListener("click", () => {
          modal.classList.add("hidden");
        });

        modal.addEventListener("click", (e) => {
          if (e.target === modal) {
            modal.classList.add("hidden");
          }
        });

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && !modal.classList.contains("hidden")) {
            modal.classList.add("hidden");
          }
        });
      }

      // BIND FILTER BUTTON EVENTS
      function bindFilterEvents() {
        document.querySelectorAll(".filter-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            document
              .querySelectorAll(".filter-btn")
              .forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");

            applyFilter(btn.dataset.filter);
          });
        });
      }

      // RENDER PRODUCTS
      function renderProducts() {
        const container = document.getElementById("productWrapper");
        container.innerHTML = "";

        const start = (currentPage - 1) * productsPerPage;
        const end = start + productsPerPage;

        const pageItems = filteredProducts.slice(start, end);

        pageItems.forEach((product) => {
          const div = document.createElement("div");
          div.setAttribute("data-id", toSlug(product.title));
          div.className = `klik cursor-pointer
                    relative overflow-hidden
                    product-item ${toSlug(product.category)} bg-white dark:bg-[#2f2f4c] 
                    border border-gray-200 dark:border-[#3f3f5b] p-5 rounded-2xl shadow-md text-gray-800 dark:text-gray-100 transition-all duration-300 hover:shadow-lg hover:border-gray-300 dark:hover:border-[#4f4f6b]`;

          div.innerHTML = `
                    <div class="h-44 w-full overflow-hidden rounded-xl mb-4 bg-gray-100 dark:bg-gray-800">
                        <img src="${product.image || 'asset/thumbnails/toper.png'}" alt="${product.title}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105" loading="lazy" />
                    </div>
                    <span class="text-xs font-semibold px-2.5 py-1 ${product.style} text-white rounded-md">${product.category}</span>
                    <h2 class="text-lg font-bold mt-3 text-gray-800 dark:text-white">${product.title}</h2>
                    <p class="text-gray-500 dark:text-gray-400 text-sm mt-2 line-clamp-2">${truncateSmart(product.description, 80)}</p>

                    <a href="${product.cta.url}"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="block text-center mt-5 py-2.5 rounded-xl text-sm font-semibold transition
                    ${product.availability === 1 ? "bg-indigo-600 hover:bg-indigo-700 text-white" : "bg-gray-200 dark:bg-gray-700 text-gray-400 dark:text-gray-500 cursor-not-allowed pointer-events-none"}">
                    ${product.availability === 0 ? "Sold Out" : product.availability === 2 ? "Coming Soon" : product.cta.label}
                    </a>
                    <span class="
                        absolute right-0 top-0 text-white 
                        py-1 px-4 text-xs font-bold origin-top-right z-10 rounded-bl-2xl shadow
                        ${product.availability === 0 ? "bg-red-600" : product.availability === 2 ? "bg-amber-500" : "bg-blue-600 hidden"}
                    ">
                    ${product.availability === 0 ? "Sold Out" : product.availability === 2 ? "Coming Soon" : "Aru"}
                    </span>
                `;

          container.appendChild(div);
        });
      }

      // PAGINATION
      function renderPagination() {
        const pagination = document.getElementById("pagination");
        pagination.innerHTML = "";

        const totalPages = Math.ceil(filteredProducts.length / productsPerPage);

        // Prev
        const prev = document.createElement("button");
        prev.textContent = "Prev";
        prev.disabled = currentPage === 1;
        prev.className = `
                mr-1 px-4 py-1.5 rounded-lg text-sm font-semibold transition
                ${currentPage === 1 ? "bg-gray-200 dark:bg-gray-800 text-gray-400 dark:text-gray-600" : "bg-indigo-600 text-white hover:bg-indigo-700"}
                disabled:opacity-30 disabled:cursor-not-allowed
            `;
        prev.onclick = () => {
          currentPage--;
          renderProducts();
          renderPagination();
          window.scrollTo({ top: 0, behavior: "smooth" });
        };
        pagination.appendChild(prev);

        // Number buttons
        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement("button");
          btn.textContent = i;
          btn.className = `
                    mx-1 px-3 py-1.5 rounded-lg text-sm border font-semibold
                    ${
                      i === currentPage
                        ? "bg-indigo-600 text-white border-indigo-500"
                        : "bg-white dark:bg-[#2f2f4c] text-gray-600 dark:text-gray-300 border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-[#3f3f5b]"
                    }
                    transition
                `;
          btn.onclick = () => {
            currentPage = i;
            renderProducts();
            renderPagination();
            window.scrollTo({ top: 0, behavior: "smooth" });
          };
          pagination.appendChild(btn);
        }

        // Next
        const next = document.createElement("button");
        next.textContent = "Next";
        next.disabled = currentPage === totalPages || totalPages === 0;
        next.className = `
                ml-1 px-4 py-1.5 rounded-lg text-sm font-semibold transition
                ${currentPage === totalPages || totalPages === 0 ? "bg-gray-200 dark:bg-gray-800 text-gray-400 dark:text-gray-600" : "bg-indigo-600 text-white hover:bg-indigo-700"}
                disabled:opacity-30 disabled:cursor-not-allowed
            `;
        next.onclick = () => {
          currentPage++;
          renderProducts();
          renderPagination();
          window.scrollTo({ top: 0, behavior: "smooth" });
        };
        pagination.appendChild(next);
      }

      // Theme toggle handlers
      const themeToggleBtn = document.getElementById("theme-toggle-btn");
      const themeIcon = document.getElementById("theme-icon");

      function applyTheme(theme) {
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
          if (themeIcon) themeIcon.classList.replace("fa-moon", "fa-sun");
        } else {
          document.documentElement.classList.remove("dark");
          if (themeIcon) themeIcon.classList.replace("fa-sun", "fa-moon");
        }
      }

      const savedTheme = localStorage.getItem("theme");
      if (savedTheme) {
        applyTheme(savedTheme);
      } else if (
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches
      ) {
        applyTheme("dark");
      }

      if (themeToggleBtn) {
        themeToggleBtn.addEventListener("click", () => {
          const isDark = document.documentElement.classList.contains("dark");
          const newTheme = isDark ? "light" : "dark";
          applyTheme(newTheme);
          localStorage.setItem("theme", newTheme);
        });
      }

      // INIT FETCH
      fetch("asset/JSON/library.json")
        .then((res) => res.json())
        .then((data) => {
          products = data.reverse();
          filteredProducts = products;
          renderCategory();
          renderProducts();
          renderPagination();
          bindModalEvents();
        })
        .catch((err) => console.error("Error loading products:", err));
    </script>
  </body>
</html>
