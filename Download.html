<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Tutorial Belajar JavaScript</title>
  </head>

  <body>
    <h3>Contoh 2: Mengambil nilai tag input</h3>
    <p>Nama: Joko Susilo, Nilai: <span id="nilai_joko">92</span></p>
    <form onsubmit="return false">
      <label>Rika Pratiwi: </label>
      <input type="text" id="inText" value="yy" />
      <button id="klik">Tampilkan Nilai</button>
    </form>

    <br />
    <br />

    <h2>Hasil: <span id="hasil"></span></h2>
  </body>

  <script>
    var nama = document.getElementById("inText").innerText;
    var nilai_joko = document.getElementById("nilai_joko").innerHTML;
    document.getElementById("klik").addEventListener("click", pesan);
    function pesan() {
      var pesan = document.getElementById("inText").value;
      document.getElementById("hasil").innerHTML = pesan + " dan " + nilai_joko;
      alert(nama);
    }
  </script>
</html>
